openapi: 3.0.0
info:
  version: 1.0.0
  title: AMS DApp API
  description: |
    REST API for the AMS DApp — a blockchain-backed Attendance Management
    System (CN6035). Serves the React client at :3000 and talks to
    MongoDB + a Ganache chain via Truffle-managed contracts
    (`AttendanceRecord`, `AttendanceNFT`).
schemes:
  - http
servers:
  - url: http://localhost:5001/api/v1
    description: Local development
tags:
  - name: Auth
    description: Authentication and authorization operations
  - name: Admin Auth
    description: Authentication for Admin
  - name: User
    description: Routes related to End User
  - name: Session
    description: Live sessions + QR check-in / check-out (admin-gated where noted)
  - name: Attendance
    description: Attendance history + public on-chain verification
  - name: Student
    description: Student profile + wallet registration
  - name: NFT
    description: Attendance NFT certificate minting and lookup (AttendanceNFT contract)
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Creates a new User
      description: Creates a new user
      consumes:
        - application/json
      produces:
        - application/json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  required: true
                  example: user@email.com
                password:
                  type: string
                  example: Password@123
      responses:
        "201":
          description: User Created successfully.
        "400":
          description: Unable to create user.
        "500":
          description: Internal Server Error
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login a user
      description: Login a user using email and password.
      consumes:
        - application/json
      produces:
        - application/json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  required: true
                  example: user@email.com
                password:
                  type: string
                  example: Password@123
      responses:
        "200":
          description: Logged In Successfully.
        "400":
          description: Unable to Login.
        "500":
          description: Internal Server Error
  /auth/token/verify:
    get:
      tags:
        - Auth
      summary: Verifies a given token for a new user
      description: Verifies a token for a new user
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: query
          name: t
          schema:
            type: string
          description: Access token
      responses:
        "200":
          description: Token Verified successfully.
        "400":
          description: Failed to verify the token.
        "500":
          description: Internal Server Error
  /auth/token/resend:
    post:
      tags:
        - Auth
      summary: Resend Token
      description: Resend Token for a new user
      consumes:
        - application/json
      produces:
        - application/json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  required: true
                  example: user@email.com
                password:
                  type: string
                  example: Password@123
      responses:
        "200":
          description: Token Resent Successfully.
        "400":
          description: Unable to Resend token.
        "401":
          description: Incorrect Password.
        "500":
          description: Internal Server Error
  /auth/password:
    patch:
      tags:
        - Auth
      summary: Change Password
      description: Change password using old password
      consumes:
        - application/json
      produces:
        - application/json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                oldPassword:
                  type: string
                  required: true
                  example: Password@123
                newPassword:
                  type: string
                  example: Password@124
      responses:
        "200":
          description: Password Changed Successfully.
        "400":
          description: Bad Request.
        "403":
          description: Password Change Failed Try Again later
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /auth/password/reset/code/resend:
    post:
      tags:
        - Auth
      summary: Regenerate code to reset password
      description: Regenerate OTP to reset password
      consumes:
        - application/json
      produces:
        - application/json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  required: true
                  example: user@email.com
      responses:
        "200":
          description: OTP Sent successfully to your email.
        "400":
          description: Failed, User doesn't exist.
        "500":
          description: Internal Server Error
  /auth/password/reset/code:
    post:
      tags:
        - Auth
      summary: Generate code to reset password
      description: Generate OTP to reset password
      consumes:
        - application/json
      produces:
        - application/json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  required: true
                  example: user@email.com
      responses:
        "200":
          description: OTP Sent successfully to your email.
        "400":
          description: Failed, User doesn't exist.
        "500":
          description: Internal Server Error
  /auth/password/reset:
    post:
      tags:
        - Auth
      summary: Reset password using OTP
      description: Reset password of a user using OTP.
      consumes:
        - application/json
      produces:
        - application/json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  required: true
                  example: user@email.com
                password:
                  type: string
                  required: true
                  example: password@123
                otp:
                  type: integer
                  required: true
      responses:
        "200":
          description: Password Reset successfully.
        "400":
          description: Failed, Check the error message for details.
        "500":
          description: Internal Server Error
  /auth:
    delete:
      tags:
        - Auth
      summary: Delete a user permanently
      description: Deletes a user permanently.
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: Deleted Successfully.
        "400":
          description: Bad Request.
        "403":
          description: Failed to delete user
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /admin/auth/register:
    post:
      tags:
        - Admin Auth
      summary: Creates a new Admin account
      description: Creates a new Admin account
      consumes:
        - application/json
      produces:
        - application/json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  required: true
                  example: user@email.com
                password:
                  type: string
                  example: Password@123
      responses:
        "201":
          description: Admin user Created successfully.
        "400":
          description: Unable to create Admin user.
        "500":
          description: Internal Server Error
  /admin/auth/login:
    post:
      tags:
        - Admin Auth
      summary: Login as an Admin
      description: Login as an admin using email and password.
      consumes:
        - application/json
      produces:
        - application/json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  required: true
                  example: user@email.com
                password:
                  type: string
                  example: Password@123
      responses:
        "200":
          description: Logged In Successfully.
        "400":
          description: Unable to Login.
        "500":
          description: Internal Server Error
  /admin/auth/users:
    get:
      tags:
        - Admin Auth
      summary: Get a list of all the users
      description: Get a list of all the users registered in this app.
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: Users Fetched successfully.
        "403":
          description: Failed, Forbidden to fetch user
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /admin/auth/admins:
    patch:
      tags:
        - Admin Auth
      summary: Get a list of all the admins.
      description: Get a list of all the admins registered in the app.
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: Admins Fetched successfully.
        "403":
          description: Failed, Forbidden to fetch admins.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /admin/auth/user/enable:
    get:
      tags:
        - Admin Auth
      summary: Enable an admin account.
      description: Enable an admin account using access token.
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: Account enabled successfully.
        "403":
          description: Failed, Forbidden to enable user account.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /admin/auth/user/disable:
    get:
      tags:
        - Admin Auth
      summary: Disable an admin account.
      description: Disable an admin account using access token.
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: Account disabled successfully.
        "403":
          description: Failed, Forbidden to disable user account.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []

  /user:
    get:
      tags:
        - User
      summary: Get all the details of a user
      description: Get a list of all the details of a user by providing access token.
      consumes:
        - application/json
      produces:
        - application/json
      responses:
        "200":
          description: User Data Fetched successfully.
        "403":
          description: Failed, Forbidden to fetch user data.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
    patch:
      tags:
        - User
      summary: Edit User Details
      description: Edit data related to the user.
      consumes:
        - application/json
      produces:
        - application/json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                  required: true
                  example: Shubham
                lastName:
                  type: string
                  example: Raj
                gender:
                  type: string
                  example: Male
                age:
                  type: integer
                  example: 20
      responses:
        "200":
          description: User Data Fetched successfully.
        "403":
          description: Failed, Forbidden to fetch user data.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /nft/mint:
    post:
      tags:
        - NFT
      summary: Mint the next eligible NFT certificate for a student
      description: >-
        Backend checks the student's `totalCheckIns` against the tier thresholds
        (Bronze 5, Silver 15, Gold 30, Platinum 50) and mints the highest tier
        they qualify for. The on-chain tx is signed by the contract owner
        (Ganache account 0 in development). Requires a student with a
        registered `walletAddress`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MintRequest"
      responses:
        "201":
          description: Certificate minted on-chain.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MintResponse"
        "400":
          description: |
            Student already has this tier, has no wallet, or hasn't crossed the
            Bronze threshold yet.
        "404":
          description: Student not found.
        "500":
          description: Internal Server Error (usually on-chain revert).
      security:
        - bearerAuth: []
  /nft/student/{walletAddress}:
    get:
      tags:
        - NFT
      summary: List all NFT certificates owned by a wallet
      parameters:
        - in: path
          name: walletAddress
          required: true
          schema:
            type: string
          example: "0x82d9B534dd1234567890abcdef1234567890abcd"
      responses:
        "200":
          description: Certificate list (empty array if none).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      certificates:
                        type: array
                        items:
                          $ref: "#/components/schemas/Certificate"
        "500":
          description: Internal Server Error
  /nft/certificate/{tokenId}:
    get:
      tags:
        - NFT
      summary: Fetch a single certificate by token ID
      parameters:
        - in: path
          name: tokenId
          required: true
          schema:
            type: string
          example: "1"
      responses:
        "200":
          description: Certificate details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      certificate:
                        $ref: "#/components/schemas/Certificate"
        "500":
          description: Internal Server Error (includes invalid tokenId).
  /nft/tiers:
    get:
      tags:
        - NFT
      summary: List tier thresholds + total minted count
      description: >-
        Returns the static tier config shared between client and server, plus
        the `getTotalMinted()` value read from the contract.
      responses:
        "200":
          description: Tier config and global mint count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      tiers:
                        type: array
                        items:
                          $ref: "#/components/schemas/Tier"
                      totalMinted:
                        type: string
                        example: "3"
        "500":
          description: Internal Server Error
  /sessions/create:
    post:
      tags:
        - Session
      summary: Admin creates a live session (with QR token)
      description: |
        Admin-only. Generates a 32-byte random `qrToken` that expires at the
        session end time. Lecturers may only create sessions for modules in
        their scope; `super_admin` bypasses the filter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseId, courseName, date, startTime, endTime]
              properties:
                courseId:
                  type: string
                  example: CN6035
                courseName:
                  type: string
                  example: Blockchain Applications
                date:
                  type: string
                  format: date
                  example: "2026-04-22"
                startTime:
                  type: string
                  example: "10:00"
                endTime:
                  type: string
                  example: "12:00"
      responses:
        "201":
          description: Session created; returns `sessionId`, `qrToken`, `qrExpiresAt`.
        "400":
          description: Missing required field.
        "403":
          description: Admin not assigned to this module.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /sessions/check-in:
    post:
      tags:
        - Session
      summary: Student check-in via QR token
      description: |
        Hashes `(studentId, courseId, date)` as keccak256 and submits to
        `AttendanceRecord.recordAttendance`. Duplicates revert at the
        contract level (anti-replay).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qrToken, studentId]
              properties:
                qrToken:
                  type: string
                studentId:
                  type: string
                  example: u2414204
                walletAddress:
                  type: string
      responses:
        "201":
          description: Check-in recorded; returns `attendanceHash`, `txHash`, `blockNumber`.
        "400":
          description: Missing field or student already checked in.
        "404":
          description: Invalid QR token or student not registered.
        "500":
          description: Internal Server Error
  /sessions/check-out:
    post:
      tags:
        - Session
      summary: Student check-out
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qrToken, studentId]
              properties:
                qrToken:
                  type: string
                studentId:
                  type: string
      responses:
        "200":
          description: Checked out; returns `checkOutTime` + `durationMinutes`.
        "400":
          description: Student did not check in, or already checked out.
        "404":
          description: Session not found.
        "500":
          description: Internal Server Error
  /sessions/all:
    get:
      tags:
        - Session
      summary: List sessions visible to the caller (module-scoped)
      responses:
        "200":
          description: Array of `Session` docs.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /sessions/qr/{token}:
    get:
      tags:
        - Session
      summary: Resolve a QR token to session metadata (public)
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session metadata for the UI.
        "404":
          description: Invalid or expired QR token.
        "500":
          description: Internal Server Error
  /sessions/{id}:
    get:
      tags:
        - Session
      summary: Fetch a single session (admin, module-scoped)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session detail.
        "403":
          description: Session belongs to a module outside your scope.
        "404":
          description: Session not found.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /sessions/end/{id}:
    patch:
      tags:
        - Session
      summary: Close a session (admin, module-scoped)
      description: Marks the session inactive and force-checks-out anyone still checked in.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session closed.
        "403":
          description: Outside your module scope.
        "404":
          description: Session not found.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /blockchain/check-in:
    post:
      tags:
        - Attendance
      summary: Direct on-chain attendance record (admin tooling)
      description: |
        Lower-level endpoint used by the admin check-in screen (design #04);
        the student flow goes through `/sessions/check-in` instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId, courseId, date]
              properties:
                studentId:
                  type: string
                courseId:
                  type: string
                date:
                  type: string
                  format: date
                walletAddress:
                  type: string
      responses:
        "201":
          description: Recorded + mirrored in MongoDB.
        "400":
          description: Missing field / duplicate commit.
        "500":
          description: Internal Server Error
  /blockchain/verify/{hash}:
    get:
      tags:
        - Attendance
      summary: Verify an attendance hash on-chain (public)
      description: |
        Accepts a raw 64-char hex digest, a 0x-prefixed 66-char tx hash,
        or a numeric token id. Hits `AttendanceRecord.verifyAttendance` and
        joins the result with the off-chain `BlockchainAttendance` doc for
        UI-friendly metadata.
      parameters:
        - in: path
          name: hash
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verdict + on-chain + off-chain metadata.
        "404":
          description: Hash not found on-chain.
        "500":
          description: Internal Server Error
  /blockchain/records:
    get:
      tags:
        - Attendance
      summary: Admin-scoped attendance history
      responses:
        "200":
          description: Array of `BlockchainAttendance` docs.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /blockchain/records/{id}:
    delete:
      tags:
        - Attendance
      summary: Remove an off-chain mirror row (admin only)
      description: |
        Deletes the MongoDB mirror only — the on-chain record is immutable
        by design and cannot be undone.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed.
        "404":
          description: Record not found.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /blockchain/export/csv:
    get:
      tags:
        - Attendance
      summary: CSV export of attendance records (admin-scoped)
      responses:
        "200":
          description: text/csv stream.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /students/register:
    post:
      tags:
        - Student
      summary: Bootstrap a student profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId, name, email]
              properties:
                studentId:
                  type: string
                name:
                  type: string
                email:
                  type: string
                courseId:
                  type: string
                walletAddress:
                  type: string
      responses:
        "201":
          description: Profile created.
        "400":
          description: Missing field.
        "409":
          description: Student already registered.
        "500":
          description: Internal Server Error
  /students/wallet/{studentId}:
    patch:
      tags:
        - Student
      summary: Register or update a student's wallet address
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [walletAddress]
              properties:
                walletAddress:
                  type: string
      responses:
        "200":
          description: Wallet updated.
        "404":
          description: Student not found.
        "500":
          description: Internal Server Error
  /students/profile/{studentId}:
    get:
      tags:
        - Student
      summary: Fetch student profile + attendance stats
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile + totals.
        "404":
          description: Not found.
        "500":
          description: Internal Server Error
  /students/all:
    get:
      tags:
        - Student
      summary: List students visible to the caller (module-scoped)
      responses:
        "200":
          description: Array of `StudentProfile` docs.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /students/flagged:
    get:
      tags:
        - Student
      summary: Students below the 75 % attendance threshold (admin)
      responses:
        "200":
          description: Flagged-for-review list.
        "500":
          description: Internal Server Error
      security:
        - bearerAuth: []
  /nft/tier-stats:
    get:
      tags:
        - NFT
      summary: Per-tier minted counts
      description: Powers the dashboard NFT-distribution widget.
      responses:
        "200":
          description: Counts keyed by tier (`bronze`, `silver`, `gold`, `platinum`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    additionalProperties:
                      type: integer
        "500":
          description: Internal Server Error
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        userId:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        gender:
          type: string
        age:
          type: integer
        knownLanguages:
          type: string
        profession:
          type: string
        location:
          type: string
        latitude:
          type: integer
        longitude:
          type: integer
        photoUrl:
          type: string
        symptoms:
          type: string
      required:
        - userId
        - email
    Auth:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        admin:
          type: boolean
        adminVerified:
          type: boolean
        disabled:
          type: boolean
        emailVerified:
          type: boolean
        provider:
          type: boolean
        oauthToken:
          type: string
      required:
        - email
    Token:
      type: object
      properties:
        _userId:
          type: string
        token:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - _userId
        - token
        - createdAt
    Tier:
      type: object
      properties:
        name:
          type: string
          example: Bronze
        threshold:
          type: integer
          example: 5
      required:
        - name
        - threshold
    Certificate:
      type: object
      properties:
        tokenId:
          type: string
          example: "1"
        student:
          type: string
          description: Wallet address the NFT was minted to.
          example: "0x82d9B534dd1234567890abcdef1234567890abcd"
        studentId:
          type: string
          example: "u2414204"
        tier:
          type: string
          example: Bronze
        sessionsAttended:
          type: string
          example: "7"
        issuedAt:
          type: string
          description: Unix timestamp (seconds) from the block.
          example: "1718000000"
      required:
        - tokenId
        - student
        - studentId
        - tier
    MintRequest:
      type: object
      properties:
        studentId:
          type: string
          example: "u2414204"
      required:
        - studentId
    MintResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: "Bronze certificate minted to 0x82d9B534dd…"
        data:
          type: object
          properties:
            tokenId:
              type: string
              example: "1"
            txHash:
              type: string
              example: "0xabc…"
            blockNumber:
              type: integer
              example: 42
            tier:
              type: string
              example: Bronze
            sessionsAttended:
              type: integer
              example: 7
            walletAddress:
              type: string
              example: "0x82d9B534dd1234567890abcdef1234567890abcd"
